<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カーリル 図書館蔵書検索</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --text: #1e293b;
      --subtext: #64748b;
      --success: #059669;
      --success-bg: #d1fae5;
      --success-text: #065f46;
      --warning-bg: #fef3c7;
      --warning-text: #92400e;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --gray-bg: #f1f5f9;
      --gray-text: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    header h1 {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.875rem;
      opacity: 0.85;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fafbfc;
    }

    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 0.8125rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .step-num.done { background: var(--success); }

    .card-title { font-size: 0.9375rem; font-weight: 600; }

    .card-body { padding: 20px; }

    .search-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], select {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    select { cursor: pointer; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-size: 0.9375rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 1px 3px rgba(37,99,235,0.25);
    }

    .btn:hover { background: var(--primary-dark); box-shadow: 0 2px 6px rgba(37,99,235,0.35); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-green {
      background: var(--success);
      box-shadow: 0 1px 3px rgba(5,150,105,0.25);
    }
    .btn-green:hover { background: #047857; box-shadow: 0 2px 6px rgba(5,150,105,0.35); }

    .book-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .book-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      align-items: flex-start;
    }

    .book-item:hover { border-color: var(--primary); background: var(--primary-light); }
    .book-item.selected { border-color: var(--primary); background: var(--primary-light); }

    .book-cover {
      width: 50px;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--gray-bg);
    }

    .book-placeholder {
      width: 50px;
      height: 70px;
      border-radius: 4px;
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.5rem;
    }

    .book-info { flex: 1; min-width: 0; }

    .book-title {
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 3px;
    }

    .book-authors {
      font-size: 0.8125rem;
      color: var(--subtext);
      margin-bottom: 2px;
    }

    .book-isbn {
      font-size: 0.75rem;
      color: var(--subtext);
      font-family: 'Consolas', 'Courier New', monospace;
      margin-top: 4px;
    }

    .hint {
      font-size: 0.8125rem;
      color: var(--subtext);
      margin-top: 10px;
      line-height: 1.5;
    }

    .pref-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .library-controls {
      margin-bottom: 12px;
    }

    .select-all-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.8125rem;
      color: var(--subtext);
      cursor: pointer;
      user-select: none;
    }

    .library-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .library-list::-webkit-scrollbar { width: 6px; }
    .library-list::-webkit-scrollbar-track { background: transparent; }
    .library-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .library-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .library-item:hover { border-color: #94a3b8; }
    .library-item.checked { border-color: var(--primary); background: var(--primary-light); }

    .library-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--primary);
      margin-top: 2px;
    }

    .library-name { font-size: 0.9rem; font-weight: 500; line-height: 1.3; }
    .library-sub { font-size: 0.78rem; color: var(--subtext); margin-top: 2px; }
    .library-count { font-size: 0.75rem; color: var(--primary); margin-top: 2px; }

    .check-btn-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .selected-count {
      font-size: 0.8125rem;
      color: var(--subtext);
    }

    .result-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .result-item:last-child { border-bottom: none; }

    .result-sys-name {
      font-weight: 600;
      font-size: 0.9375rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .reserve-link {
      font-size: 0.78rem;
      color: var(--primary);
      text-decoration: none;
      padding: 2px 8px;
      border: 1px solid var(--primary);
      border-radius: 4px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .reserve-link:hover { background: var(--primary-light); }

    .branch-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .branch-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .status-available  { background: var(--success-bg); color: var(--success-text); }
    .status-inlib      { background: var(--warning-bg); color: var(--warning-text); }
    .status-lent       { background: var(--danger-bg);  color: var(--danger-text);  }
    .status-none       { background: var(--gray-bg);    color: var(--gray-text);    }
    .status-unknown    { background: #f1f5f9;            color: #475569;             }

    .loading-state {
      text-align: center;
      padding: 28px 20px;
      color: var(--subtext);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }

    .empty-state {
      text-align: center;
      padding: 28px 20px;
      color: var(--subtext);
      font-size: 0.875rem;
    }

    .hidden { display: none !important; }

    .progress-text {
      font-size: 0.8rem;
      color: var(--subtext);
      margin-top: 6px;
    }

    .result-summary {
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--subtext);
    }

    .tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 4px;
    }
    .tag-available { background: var(--success-bg); color: var(--success-text); }
    .tag-lent      { background: var(--danger-bg);  color: var(--danger-text); }
    .tag-none      { background: var(--gray-bg);    color: var(--gray-text); }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: var(--subtext);
    }

    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      header h1 { font-size: 1.25rem; }
      .search-row { flex-direction: column; }
      .pref-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 図書館蔵書検索</h1>
  <p>カーリルAPIを使って全国の図書館の蔵書を検索できます</p>
</header>

<main>

  <!-- STEP 1: Book Search -->
  <div class="card" id="step1">
    <div class="card-header">
      <div class="step-num" id="badge1">1</div>
      <span class="card-title">本を検索する</span>
    </div>
    <div class="card-body">
      <div class="search-row">
        <input type="text" id="book-query"
          placeholder="タイトル・著者名・ISBN（13桁）で検索..." />
        <button class="btn" onclick="searchBooks()">検索</button>
      </div>
      <div class="hint">例: 「走れメロス」「村上春樹」「9784101001616」</div>
      <div id="book-results"></div>
    </div>
  </div>

  <!-- STEP 2: Library Selection -->
  <div class="card hidden" id="step2">
    <div class="card-header">
      <div class="step-num" id="badge2">2</div>
      <span class="card-title">図書館を選ぶ</span>
    </div>
    <div class="card-body">
      <div class="pref-row library-controls">
        <select id="pref-select">
          <option value="">都道府県を選択...</option>
        </select>
        <button class="btn" onclick="searchLibraries()">図書館を探す</button>
      </div>
      <div id="library-results"></div>
      <div class="check-btn-row hidden" id="check-btn-row">
        <span class="selected-count" id="selected-count"></span>
        <button class="btn btn-green" onclick="checkAvailability()">蔵書を確認する →</button>
      </div>
    </div>
  </div>

  <!-- STEP 3: Results -->
  <div class="card hidden" id="step3">
    <div class="card-header">
      <div class="step-num" id="badge3">3</div>
      <span class="card-title">蔵書の確認結果</span>
    </div>
    <div id="results-content"></div>
  </div>

</main>

<footer>
  蔵書データ: <a href="https://calil.jp/" target="_blank" rel="noopener">カーリル</a> &nbsp;|&nbsp;
  書誌情報: <a href="https://books.google.com/" target="_blank" rel="noopener">Google Books</a>
</footer>

<script>
const APPKEY = '168359889621a3c994cb06ee9af1bae4';

const PREFS = [
  '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
  '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
  '新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県',
  '静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県',
  '奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県',
  '徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県',
  '熊本県','大分県','宮崎県','鹿児島県','沖縄県'
];

// State
let selectedBook = null;
let systemsMap = {};       // systemid -> { systemname, formal, pref, city, count }
let checkedSystems = new Set();

// Init prefecture dropdown
const prefSelect = document.getElementById('pref-select');
PREFS.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p;
  opt.textContent = p;
  prefSelect.appendChild(opt);
});

document.getElementById('book-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchBooks();
});

// JSONP helper for CALIL API
function jsonpCall(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_calil_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウトしました'));
    }, 20000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = data => { cleanup(); resolve(data); };

    const script = document.createElement('script');
    script.onerror = () => { cleanup(); reject(new Error('通信エラーが発生しました')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function statusClass(s) {
  if (s === '貸出可能' || s === '蔵書あり') return 'status-available';
  if (s === '館内のみ' || s === '準備中' || s === '休館中') return 'status-inlib';
  if (s === '貸出中' || s === '予約中') return 'status-lent';
  if (s === '蔵書なし') return 'status-none';
  return 'status-unknown';
}

// ───── STEP 1: Book Search ─────

async function searchBooks() {
  const q = document.getElementById('book-query').value.trim();
  if (!q) return;

  const container = document.getElementById('book-results');
  container.innerHTML = `<div class="loading-state"><span class="spinner"></span>検索中...</div>`;

  try {
    const clean = q.replace(/[-\s]/g, '');
    const query = /^\d{10,13}$/.test(clean) ? `isbn:${clean}` : q;

    const res = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=ja&maxResults=10`
    );
    if (!res.ok) throw new Error('Google Books APIエラー');
    const data = await res.json();

    const items = (data.items || []).map(item => {
      const v = item.volumeInfo || {};
      const ids = v.industryIdentifiers || [];
      const isbn13 = ids.find(i => i.type === 'ISBN_13')?.identifier;
      const isbn10 = ids.find(i => i.type === 'ISBN_10')?.identifier;
      return {
        title: v.title || '（タイトル不明）',
        authors: (v.authors || []).join('、'),
        publisher: v.publisher || '',
        publishedDate: (v.publishedDate || '').slice(0, 4),
        thumbnail: v.imageLinks?.smallThumbnail || '',
        isbn: isbn13 || isbn10 || '',
        isbn13: isbn13 || '',
      };
    }).filter(b => b.isbn);

    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state">本が見つかりませんでした。ISBNを直接入力してお試しください。</div>`;
      return;
    }

    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'book-list';

    items.forEach(book => {
      const el = document.createElement('div');
      el.className = 'book-item';
      el.innerHTML = `
        ${book.thumbnail
          ? `<img class="book-cover" src="${esc(book.thumbnail)}" alt="${esc(book.title)}" loading="lazy" />`
          : `<div class="book-placeholder">📖</div>`}
        <div class="book-info">
          <div class="book-title">${esc(book.title)}</div>
          <div class="book-authors">${esc(book.authors)}${book.publisher ? '　' + esc(book.publisher) : ''}${book.publishedDate ? '　' + esc(book.publishedDate) + '年' : ''}</div>
          <div class="book-isbn">ISBN: ${esc(book.isbn)}</div>
        </div>
      `;
      el.addEventListener('click', () => selectBook(book, el));
      list.appendChild(el);
    });

    container.appendChild(list);
  } catch (e) {
    container.innerHTML = `<div class="empty-state">エラー: ${esc(e.message)}</div>`;
  }
}

function selectBook(book, el) {
  document.querySelectorAll('.book-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedBook = book;
  document.getElementById('badge1').textContent = '✓';
  document.getElementById('badge1').classList.add('done');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step2').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  // Reset step 2/3
  document.getElementById('library-results').innerHTML = '';
  document.getElementById('check-btn-row').classList.add('hidden');
  document.getElementById('step3').classList.add('hidden');
  systemsMap = {};
  checkedSystems.clear();
}

// ───── STEP 2: Library Search ─────

async function searchLibraries() {
  const pref = document.getElementById('pref-select').value;
  if (!pref) { alert('都道府県を選択してください'); return; }

  const container = document.getElementById('library-results');
  container.innerHTML = `<div class="loading-state"><span class="spinner"></span>図書館を検索中...</div>`;
  document.getElementById('check-btn-row').classList.add('hidden');
  checkedSystems.clear();
  systemsMap = {};

  try {
    const url = `https://api.calil.jp/library?appkey=${APPKEY}&pref=${encodeURIComponent(pref)}&limit=200`;
    const raw = await jsonpCall(url);
    const libs = Array.isArray(raw) ? raw : (raw.library || []);

    // Filter public libraries, group by systemid
    const groups = {};
    libs
      .filter(l => !l.category || l.category === 'public')
      .forEach(l => {
        if (!groups[l.systemid]) {
          groups[l.systemid] = {
            systemid: l.systemid,
            systemname: l.systemname || l.formal || l.short,
            pref: l.pref,
            city: l.city || '',
            branches: []
          };
        }
        groups[l.systemid].branches.push(l.formal || l.short);
      });

    const systems = Object.values(groups);

    if (systems.length === 0) {
      container.innerHTML = `<div class="empty-state">${esc(pref)}に公共図書館が見つかりませんでした。</div>`;
      return;
    }

    systemsMap = {};
    systems.forEach(s => { systemsMap[s.systemid] = s; });

    container.innerHTML = '';

    const allLabel = document.createElement('label');
    allLabel.className = 'select-all-label';
    allLabel.innerHTML = `<input type="checkbox" id="sel-all" /> すべて選択 （${systems.length}館システム）`;
    container.appendChild(allLabel);

    const list = document.createElement('div');
    list.className = 'library-list';

    systems.forEach(sys => {
      const item = document.createElement('div');
      item.className = 'library-item';
      const branchPreview = sys.branches.slice(0, 3).join('、') + (sys.branches.length > 3 ? ' 他' : '');
      item.innerHTML = `
        <input type="checkbox" id="sys-${esc(sys.systemid)}" value="${esc(sys.systemid)}" />
        <div>
          <div class="library-name">${esc(sys.systemname)}</div>
          <div class="library-sub">${esc(sys.city || sys.pref)}</div>
          <div class="library-count">${sys.branches.length}館: ${esc(branchPreview)}</div>
        </div>
      `;
      const cb = item.querySelector('input[type="checkbox"]');
      const toggle = checked => {
        cb.checked = checked;
        item.classList.toggle('checked', checked);
        if (checked) checkedSystems.add(sys.systemid);
        else checkedSystems.delete(sys.systemid);
        updateCheckBtn();
      };
      cb.addEventListener('change', () => toggle(cb.checked));
      item.addEventListener('click', e => { if (e.target !== cb) toggle(!cb.checked); });
      list.appendChild(item);
    });

    container.appendChild(list);

    document.getElementById('sel-all').addEventListener('change', e => {
      list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const ev = new Event('change');
        cb.checked = e.target.checked;
        cb.dispatchEvent(ev);
      });
    });

  } catch (e) {
    container.innerHTML = `<div class="empty-state">エラー: ${esc(e.message)}</div>`;
  }
}

function updateCheckBtn() {
  const row = document.getElementById('check-btn-row');
  const countEl = document.getElementById('selected-count');
  if (checkedSystems.size === 0) {
    row.classList.add('hidden');
  } else {
    row.classList.remove('hidden');
    countEl.textContent = `${checkedSystems.size}館システム選択中`;
  }
}

// ───── STEP 3: Availability Check ─────

async function checkAvailability() {
  if (!selectedBook || checkedSystems.size === 0) return;

  const isbn = selectedBook.isbn13 || selectedBook.isbn;
  const sysIds = [...checkedSystems];

  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('step3').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const content = document.getElementById('results-content');
  content.innerHTML = `
    <div class="loading-state">
      <span class="spinner"></span>蔵書情報を取得中...
      <div class="progress-text">「${esc(selectedBook.title)}」を ${sysIds.length} 館システムで確認しています</div>
    </div>
  `;

  try {
    // Batch: CALIL can handle multiple systemids at once (comma-separated)
    const BATCH = 9;
    const allBookData = {};

    for (let i = 0; i < sysIds.length; i += BATCH) {
      const batch = sysIds.slice(i, i + BATCH);
      const sysParam = batch.join(',');
      const baseUrl = `https://api.calil.jp/library?appkey=${APPKEY}`;

      // First call
      let checkUrl = `https://api.calil.jp/check?appkey=${APPKEY}&isbn=${encodeURIComponent(isbn)}&systemid=${encodeURIComponent(sysParam)}`;
      let session = null;

      while (true) {
        const url = session
          ? `https://api.calil.jp/check?appkey=${APPKEY}&session=${encodeURIComponent(session)}`
          : checkUrl;

        const data = await jsonpCall(url);
        session = data.session;

        if (data.books) {
          Object.entries(data.books).forEach(([isbnKey, systems]) => {
            if (!allBookData[isbnKey]) allBookData[isbnKey] = {};
            Object.assign(allBookData[isbnKey], systems);
          });
        }

        if (!data.continue || data.continue === 0) break;
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    const bookData = allBookData[isbn] || {};

    content.innerHTML = '';

    // Summary row
    let availCount = 0;
    sysIds.forEach(sid => {
      const sd = bookData[sid];
      if (!sd) return;
      const libkeys = sd.libkey || {};
      if (Object.values(libkeys).some(s => s === '貸出可能')) availCount++;
    });

    const summaryDiv = document.createElement('div');
    summaryDiv.className = 'result-summary';
    summaryDiv.innerHTML = `
      「${esc(selectedBook.title)}」の蔵書確認完了 —
      ${availCount > 0
        ? `<span class="tag tag-available">貸出可能 ${availCount}館</span>`
        : `<span class="tag tag-lent">現在貸出可能な館なし</span>`}
    `;
    content.appendChild(summaryDiv);

    sysIds.forEach(sid => {
      const sys = systemsMap[sid];
      const sd = bookData[sid];
      const item = document.createElement('div');
      item.className = 'result-item';
      const sysName = esc(sys?.systemname || sid);

      if (!sd || sd.status === 'Error' || sd.status === 'Timeout') {
        item.innerHTML = `
          <div class="result-sys-name">${sysName}</div>
          <div class="branch-list">
            <span class="branch-badge status-none">情報を取得できませんでした</span>
          </div>
        `;
      } else {
        const libkeys = sd.libkey || {};
        const reserveUrl = sd.reserveurl || '';
        const entries = Object.entries(libkeys);

        item.innerHTML = `
          <div class="result-sys-name">
            ${sysName}
            ${reserveUrl ? `<a class="reserve-link" href="${esc(reserveUrl)}" target="_blank" rel="noopener">予約する</a>` : ''}
          </div>
          <div class="branch-list">
            ${entries.length > 0
              ? entries.map(([lib, status]) =>
                  `<span class="branch-badge ${statusClass(status)}">
                    <span>${esc(lib)}</span>
                    <strong>${esc(status)}</strong>
                  </span>`
                ).join('')
              : `<span class="branch-badge status-none">蔵書なし</span>`
            }
          </div>
        `;
      }
      content.appendChild(item);
    });

    document.getElementById('badge3').textContent = '✓';
    document.getElementById('badge3').classList.add('done');

  } catch (e) {
    content.innerHTML = `<div class="empty-state">エラー: ${esc(e.message)}</div>`;
  }
}
</script>
